<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Zepp / 小米运动 / Zepp Life 登录接口 Python 库，小程序入口展示。">
  <title>Zepp-Life-Steps 小程序入口</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14211c;
      --muted: #66746e;
      --line: #d8e2dc;
      --paper: #f7faf7;
      --panel: #ffffff;
      --accent: #0f8f63;
      --accent-strong: #075f43;
      --code: #263c35;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 143, 99, 0.10), transparent 38%),
        linear-gradient(315deg, rgba(20, 33, 28, 0.08), transparent 42%),
        var(--paper);
    }

    main {
      width: min(1120px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 420px);
      gap: 48px;
      align-items: center;
      padding: 64px 0;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(38px, 7vw, 76px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .summary {
      max-width: 660px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 34px;
    }

    .tag {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      color: var(--code);
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1;
    }

    .qr-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 24px 60px rgba(20, 33, 28, 0.12);
      padding: 22px;
    }

    .qr-frame {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      object-fit: contain;
    }

    .qr-title {
      margin: 18px 0 6px;
      font-size: 20px;
      font-weight: 800;
    }

    .qr-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 18px;
      padding: 0 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .link:focus-visible {
      outline: 3px solid rgba(15, 143, 99, 0.28);
      outline-offset: 3px;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        gap: 34px;
        width: min(100% - 28px, 560px);
        padding: 42px 0;
      }

      h1 {
        font-size: clamp(34px, 13vw, 54px);
      }

      .summary {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section aria-labelledby="page-title">
      <p class="eyebrow">Zepp-Life-Steps</p>
      <h1 id="page-title">Zepp Life 登录接口库与小程序入口</h1>
      <p class="summary">
        Zepp / 小米运动 / Zepp Life 登录接口 Python 库，支持账号登录并获取 access、login_token、app_token、user_id。
      </p>
      <div class="meta" aria-label="项目标签">
        <span class="tag">Python 登录库</span>
        <span class="tag">Zepp Life</span>
        <span class="tag">小程序入口</span>
      </div>
    </section>

    <section class="qr-panel" aria-labelledby="qr-title">
      <img
        class="qr-frame"
        src="https://steps.luozhinet.com/img/MiniProgramCode.png"
        alt="Zepp-Life-Steps 小程序二维码"
      >
      <h2 class="qr-title" id="qr-title">扫码进入小程序</h2>
      <p class="qr-copy">
        绑定设备前，请先在 Zepp 上解绑已有设备，否则小程序不会重新绑定设备。
      </p>
      <a class="link" href="https://steps.luozhinet.com/img/MiniProgramCode.png">打开二维码图片</a>
    </section>
  </main>
</body>
</html>
